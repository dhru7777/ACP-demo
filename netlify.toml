[build]
  publish = "."

# Site: https://dheeraj-agentic-communication-demo.netlify.app
# Connect this repo's main branch in Netlify → Build & deploy (no build command).

[[redirects]]
  from = "/"
  to = "/demo.html"
  status = 200

# Prevent phones from caching an old demo.html that pointed at localhost
[[headers]]
  for = "/demo.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
