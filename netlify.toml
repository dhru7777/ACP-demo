[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/demo.html"
  status = 200

# Prevent phones from caching an old demo.html that pointed at localhost
[[headers]]
  for = "/demo.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
